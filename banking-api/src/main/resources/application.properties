spring.application.name=banking-api
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:banking_db}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&createDatabaseIfNotExist=true
spring.datasource.username=${DB_USER:banking_user}
spring.datasource.password=${DB_PASSWORD:12345Bank}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=never
server.port=${SERVER_PORT:8080}
server.servlet.context-path=/api
#Bank limit
banking.cashout.daily-limit=1000.00

springdoc.api-docs.path= /v3/api-docs
springdoc.swagger-ui.path= /swagger-ui.html

loging.level.com.devsu.fintech.banking_api=INFO
loging.level.org.springframework.web=INFO

management.endpoints.web.exposure.include=health,info

